syntax= "proto3";

package card_reader_crt;

service CardReader {
	rpc IsOpen(IsOpenRequest) returns (IsOpenResp) {}
    rpc Open(OpenRequest) returns (OpenResp) {}
    rpc Close(CloseRequest) returns (CloseResp) {}
    rpc Init(InitRequest) returns (InitResponse) {} 
    rpc PermitMagCardOnly(PermitMagCardOnlyRequest) returns (PermitMagCardOnlyResponse) {}
    rpc ProhibitCardIn(ProhibitCardInRequest) returns (ProhibitCardInResponse) {}
    rpc Eject(EjectRequest) returns (EjectResponse) {}
    rpc Capture(CaptureRequest) returns (CaptureResponse) {}
    rpc Retrieve(RetrieveRequest) returns (RetrieveResponse) {}
    rpc CardStatus(CardStatusRequest) returns (CardStatusResponse) {}
	rpc LEDBlinkGreen(LEDBlinkGreenRequest) returns (LEDBlinkGreenResponse) {}
    rpc LEDBlinkOrange(LEDBlinkOrangeRequest) returns (LEDBlinkOrangeResponse) {}
    rpc LEDBlinkRed(LEDBlinkRedRequest) returns (LEDBlinkRedResponse) {}
    rpc LEDOFF(LEDOFFRequest) returns (LEDOFFResponse) {}
    rpc ReadData(ReadDataRequest) returns (ReadDataResponse) {}

    rpc WaitInputReadCard(WaitInputReadCardRequest) returns (WaitInputReadCardResponse) {}
    rpc RejectCardOrMoveBin(RejectCardOrMoveBinRequest) returns (RejectCardOrMoveBinResponse) {}
}

message EjectResponse{
	bool status = 1; 
}

message EjectRequest{
}

enum RejectCardOrMoveBinStatus{
	UNDEFINED = 0;
	NOT_OPEN_DEVICE = -1;
	CARD_NOT_DETECTED = -2;
	CARD_MOVE_TO_BIN = 1;
	CARD_TAKEN = 2; 
}

message RejectCardOrMoveBinResponse{
	RejectCardOrMoveBinStatus status = 1; 
}

message RejectCardOrMoveBinRequest{
	int32 timeout = 1;
}

